name: Bug Report
description: Report a bug in GDB
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python scripts/run_benchmarks.py --benchmarks svg-1 ...`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Python: 3.12
        - OS: Ubuntu 22.04
        - gdb version: 0.1.0
        - Install method: pip install -e .
    validations:
      required: true
